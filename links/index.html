<!DOCTYPE html>
<html><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 PLIP! Simple LINK Hub &amp; Link Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800;900&family=Noto+Sans+JP:wght=300;400;500;700;900&family=Cinzel:wght=500;700;900&family=Shippori+Mincho:wght=500;700;900&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            background: #030712;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .cosmic-radial {
            background: radial-gradient(circle at 50% -20%, #111827 0%, #030712 80%);
        }

        @keyframes plipNobleFloatSVG { 
            0% { transform: translate3d(0, 0px, 0) rotate(0.001deg); } 
            50% { transform: translate3d(0, 3px, 0) rotate(0.001deg); } 
            100% { transform: translate3d(0, 0px, 0) rotate(0.001deg); } 
        }
        @keyframes plipRainbowTextSVG { 
            0% { fill: #ff0055; filter: drop-shadow(0 0 3px rgba(255, 0, 85, 0.5)); } 
            14% { fill: #ff5500; filter: drop-shadow(0 0 3px rgba(255, 85, 0, 0.5)); } 
            28% { fill: #ffcc00; filter: drop-shadow(0 0 3px rgba(255, 204, 0, 0.5)); } 
            42% { fill: #00ff66; filter: drop-shadow(0 0 3px rgba(0, 255, 102, 0.5)); } 
            50% { fill: #00ccff; filter: drop-shadow(0 0 3px rgba(0, 204, 255, 0.5)); } 
            70% { fill: #3333ff; filter: drop-shadow(0 0 3px rgba(51, 51, 255, 0.5)); } 
            84% { fill: #9900ff; filter: drop-shadow(0 0 3px rgba(153, 0, 255, 0.5)); } 
            100% { fill: #ff0055; filter: drop-shadow(0 0 3px rgba(255, 0, 85, 0.5)); } 
        }
        @keyframes plipBoltFlashSVG { 
            0%, 100% { opacity: 0.85; filter: drop-shadow(0 0 1px #fde047); } 
            50% { opacity: 1; filter: drop-shadow(0 0 5px #fde047); } 
        }
        
        .rainbow-bulb-svg { animation: plipRainbowTextSVG 7s linear infinite; }
        .flashing-bolt-svg { animation: plipBoltFlashSVG 1.5s infinite ease-in-out; }

        /* 📏 iframeおよび内部要素を枠内に歪みなく100%ジャストフィットさせるガードレールCSS */
        [id^="btn-frame-"] iframe,
        [id^="btn-frame-"] > div,
        [id^="btn-frame-"] div.w-full,
        [id^="btn-frame-"] svg {
            max-width: 100% !important;
            max-height: 100% !important;
            width: 100% !important;
            height: 100% !important;
            box-sizing: border-box !important;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }
    </style>
</head>
<body class="min-h-screen flex flex-col cosmic-radial selection:bg-amber-500/30 selection:text-white antialiased">

    <!-- 🛠 コントロールバー -->
    

    <header class="relative border-b border-slate-900 bg-slate-950/40 backdrop-blur-md py-12 px-6 sm:px-12 overflow-hidden">
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#1e293b_1px,transparent_1px),linear-gradient(to_bottom,#1e293b_1px,transparent_1px)] bg-[size:32px_32px] opacity-[0.03] pointer-events-none"></div>
        
        <div class="max-w-7xl mx-auto flex flex-col items-center text-center relative z-10">
            <h1 class="font-black text-white tracking-widest leading-none select-none flex flex-col gap-3 items-center">
                <div class="flex items-center justify-center gap-4 sm:gap-6">
                    <div class="w-12 h-12 sm:w-16 sm:h-16 shrink-0 select-none">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-full h-full">
                            <g shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
                                <g stroke="#fbbf24" stroke-linecap="round" stroke-width="1.2" opacity="0.55"><line x1="12" y1="2" x2="12" y2="4.5"></line><line x1="5.5" y1="4.5" x2="7.5" y2="6.5"></line><line x1="3" y1="12" x2="5.5" y2="12"></line><line x1="5.5" y1="19.5" x2="7.5" y2="17.5"></line><line x1="19.5" y1="17.5" x2="17.5" y2="15.5"></line><line x1="21" y1="12" x2="18.5" y2="12"></line><line x1="19.5" y1="4.5" x2="17.5" y2="6.5"></line></g>
                                <path class="rainbow-bulb-svg" d="M12,3.5 C7.5,3.5 3.8,7.2 3.8,11.8 C3.8,14.7 5.3,16.2 6.5,17.5 C7.3,18.3 7.5,19.0 7.5,19.9 L16.5,19.9 C16.5,19.0 16.7,18.3 17.5,17.5 C18.7,16.2 20.2,14.7 20.2,11.8 C20.2,7.2 16.5,3.5 12,3.5 Z" fill="#94a3b8"></path>
                                <path d="M8.5,13.9 L10.6,9.7 L13.4,9.7 L15.5,13.9" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" style="filter: drop-shadow(0 0 2px #ffffff);"></path>
                                <path d="M7.5,19.9 H16.5 V22.3 C16.5,23.0 15.9,23.7 15.1,23.7 H8.9 C8.1,23.7 7.5,23.0 7.5,22.3 Z" fill="#94a3b8" stroke="#334155" stroke-width="0.5"></path>
                                <line x1="7.9" y1="21.3" stroke="#334155" stroke-width="1.0" x2="16.1" y2="21.3"></line><line x1="8.3" y1="22.7" stroke="#334155" stroke-width="1.0" x2="15.7" y2="22.7"></line>
                                <polygon class="flashing-bolt-svg" points="23,1.4 12,12.4 17,12.4 14,22.2 25,9.6 20,9.6" fill="#fde047"></polygon>
                            </g>
                        </svg>
                    </div>
                    <span class="text-5xl sm:text-7xl font-extrabold font-mono text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 via-amber-400 to-amber-200 drop-shadow-[0_0_30px_rgba(245,158,11,0.25)]">
                        PLIP's LINK
                    </span>
                </div>
				
				
                <span class="text-xs sm:text-sm tracking-[0.25em] text-slate-400 font-light mt-1 uppercase" style="font-family: 'Cinzel', serif;">
                    <span class="text-amber-400 font-black text-lg">P</span>roduce my/your 
                    <span class="text-amber-400 font-black text-lg">L</span>ife with 
                    <span class="text-amber-400 font-black text-lg">I</span>ntellectual 
                    <span class="text-amber-400 font-black text-lg">P</span>roperty
                </span>
				
				<!-- 💡 【追加】文字とアイコンを鮮やかな水色（シアン）に完全調停したご意見感想箱ボタン -->
                <div class="w-full flex justify-end mt-4 px-2">
                    <button id="feedback-trigger-btn" onclick="openFeedbackModal();" class="text-xs font-bold text-cyan-450 hover:text-white bg-slate-950/60 hover:bg-cyan-500/10 border-2 border-amber-500/40 hover:border-cyan-400 px-4 py-2 rounded-xl transition-all duration-300 shadow-[0_2px_10px_rgba(6,182,212,0.15)] hover:shadow-[0_4px_20px_rgba(6,182,212,0.3)] flex items-center gap-2 tracking-wider select-none transform active:scale-95">
                        <i class="fa-solid fa-comment-dots text-cyan-400 group-hover:text-white animate-pulse"></i>
                        <span class="bg-gradient-to-r from-cyan-400 to-sky-300 bg-clip-text text-transparent font-black">作品へご意見・感想箱</span>
                    </button>
                </div>
				
            </h1>
        </div>
    </header>

    <div id="toast" class="fixed top-6 right-6 z-[300] transform translate-y-[-20px] opacity-0 pointer-events-none transition-all duration-300 bg-slate-900 border border-slate-800 text-slate-100 px-6 py-4 rounded-2xl shadow-[0_15px_40px_rgba(0,0,0,0.6)] flex items-center gap-3 text-xs sm:text-sm font-semibold max-w-sm">
        <span id="toast-icon" class="text-amber-400 text-lg"><i class="fa-solid fa-wand-magic-sparkles"></i></span>
        <span id="toast-text">通知メッセージ</span>
    </div>

    <main class="flex-grow max-w-6xl w-full mx-auto p-4 sm:p-8 flex flex-col gap-10">
        
        <div id="category-tabs-container" class="flex flex-wrap gap-2 p-1.5 bg-slate-950/80 border border-slate-900 rounded-2xl max-w-fit mx-auto sm:mx-0"></div>

        </div>

<!-- 💡 【追加】最前面 z-[250] を保証したご意見モーダルHTML -->
    <div id="feedback-modal" class="fixed inset-0 z-[250] flex items-center justify-center bg-black/70 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div id="feedback-modal-content" class="bg-slate-900 border border-slate-800 rounded-2xl p-6 max-w-md w-11/12 mx-auto shadow-[0_15px_40px_rgba(0,0,0,0.6)] transform scale-95 transition-transform duration-300 relative text-slate-100">
            
            <!-- 閉じる（×）ボタン -->
            <button onclick="closeFeedbackModal()" class="absolute top-4 right-4 text-slate-500 hover:text-white transition-colors text-xl">
                <i class="fas fa-times"></i>
            </button>

            <!-- タイトル -->
            <div class="flex items-center gap-2 border-b border-slate-800 pb-2 mb-4">
                <span class="text-cyan-400 text-lg"><i class="fa-solid fa-comment-dots"></i></span>
                <h3 class="text-base font-bold tracking-wider text-cyan-400" style="font-family: 'Noto Sans JP', sans-serif;">PLIP総合・ご意見感想箱</h3>
            </div>

            <p class="text-[11px] text-slate-400 mb-4 leading-relaxed">
                作品へのご要望、バグ報告、アドバイスなど、何でも自由お書き込みください。時間のあるときにひっそりと拝見します。
            </p>

            <!-- 入力フィールド -->
            <div class="space-y-4">
                <div>
                    <label for="feedback-content" class="block text-[10px] font-semibold text-slate-500 mb-1.5 uppercase tracking-wider">メッセージ（必須）</label>
                    <textarea id="feedback-content" rows="5" placeholder="ここにメッセージを入力してください..." class="w-full rounded-xl border border-slate-800 bg-slate-950 p-3 text-slate-100 placeholder-slate-700 focus:ring-2 focus:ring-cyan-600 focus:outline-none text-xs resize-none custom-scrollbar"></textarea>
                </div>

            <!-- 下部ボタンエリア -->
            <div class="mt-5 flex items-center justify-end gap-2">
                <button onclick="closeFeedbackModal()" class="px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-750 text-slate-400 text-xs font-semibold transition-all">
                    キャンセル
                </button>
                <button id="send-feedback-btn" onclick="submitFeedbackForm();" class="bg-cyan-600 hover:bg-cyan-500 text-white font-black px-5 py-2 rounded-xl text-xs transition-all shadow-lg shadow-cyan-600/20">

    <!-- カード追加モーダル -->
    

    <!-- カテゴリモーダル -->
    



   <script>
        let plipCardStates = [];

        // 🧳 クレンジング新方式：マスターデータの初期状態定義（データはHTML末尾のカプセルから自動復元されます）
        let plipMasterData = [
            { id: "asset-mgmt", title: "資産管理", sub: "ASSET MANAGEMENT", icon: "fa-solid fa-coins", isDevelopment: false, cards: [] },
            { id: "life-learning", title: "人生学習", sub: "LIFE LEARNING", icon: "fa-solid fa-graduation-cap", isDevelopment: false, cards: [] },
            { id: "future-tech", title: "未来技術", sub: "FUTURE TECHNOLOGY", icon: "fa-solid fa-microchip", isDevelopment: false, cards: [] }
        ];

        // =========================================================================
        // 💾 LocalStorage 自動セーブ＆ロード機構
        // =========================================================================
        function saveToLocalStorage() {
            try {
                localStorage.setItem('plip_master_data', JSON.stringify(plipMasterData));
            } catch (e) {
                console.error("LocalStorageへの保存に失敗しました:", e);
            }
        }



function loadFromLocalStorage() {
            // 🔄 HTML内の専用JSONデータカプセルからデータを復元（安全なクレンジング新方式）
            const embeddedContainer = document.getElementById('plip-embedded-json');
            if (embeddedContainer && embeddedContainer.textContent.trim() !== "") {
                try {
                    // Base64からUnicode文字列へ安全にデコード
                    const decodedData = decodeURIComponent(escape(atob(embeddedContainer.textContent.trim())));
                    const parsed = JSON.parse(decodedData);
                    if (parsed && parsed.length > 0) {
                        plipMasterData = parsed;
                        saveToLocalStorage();
                        return; // 読み込みに成功したらLocalStorageの処理をスキップして終了
                    }
                } catch (e) {
                    console.error("埋め込みデータの復元に失敗しました:", e);
                }
            }

            // カプセルが空、または初期状態の場合のみブラウザのLocalStorageから復元
            try {
                const saved = localStorage.getItem('plip_master_data');
                if (saved) {
                    plipMasterData = JSON.parse(saved);
                }
            } catch (e) {
                console.error("LocalStorageからの読み込みに失敗しました:", e);
            }
        }
		
		

        // 📡 iframeから通知された内部の最新状態値をダイレクトに受け取る同期機構
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'PLIP_BUTTON_CLICK') {
                const targetTitle = decodeURIComponent(event.data.title);
                const innerState = parseInt(event.data.stateValue);
                forceSyncUniversalBurst(targetTitle, innerState);
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadFromLocalStorage(); // 最初期にLocalStorageまたは埋め込みBase64からデータを復元
            initCardStates();
            buildUI();
            
            window.addEventListener("dragover", (e) => e.preventDefault());
            window.addEventListener("drop", (e) => e.preventDefault());
        });

        function initCardStates() {
            plipCardStates = [];
            plipMasterData.forEach(cat => {
                cat.cards.forEach(card => {
                    plipCardStates.push({ title: card.title, state: 0 });
                });
            });
        }

        function buildUI() {
            const tabsContainer = document.getElementById('category-tabs-container');
            const contentContainer = document.getElementById('main-content-container');
            
            const isEditMode = !!document.getElementById('generator-control-bar');

            tabsContainer.innerHTML = '';
            contentContainer.innerHTML = '';

            plipMasterData.forEach((cat, catIdx) => {
                const tabBtn = document.createElement('button');
                tabBtn.className = `px-5 py-2.5 rounded-xl text-xs sm:text-sm font-bold flex items-center gap-2 transition-all ${catIdx === 0 ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20 shadow-md' : 'text-slate-400 hover:text-slate-200'}`;
                tabBtn.setAttribute('onclick', `scrollToCategory('${cat.id}')`);
                tabBtn.innerHTML = `<i class="${cat.icon}"></i> ${cat.title} (${cat.sub})`;
                tabsContainer.appendChild(tabBtn);

                const sec = document.createElement('div');
                sec.id = cat.id;
                sec.className = "flex flex-col gap-8 relative group/sec";

                let catAdminBar = '';
                if (isEditMode) {
                    catAdminBar = `
                    <div class="flex gap-2 mb-2 bg-slate-900/90 border border-slate-800 p-2 rounded-xl max-w-fit">
                        <button onclick="openCategoryModal(${catIdx})" class="text-xs font-bold text-sky-400 hover:text-sky-300 px-2 py-1"><i class="fa-solid fa-pen"></i> カテゴリ名変更</button>
                        <button onclick="deleteCategory(${catIdx})" class="text-xs font-bold text-rose-500 hover:text-rose-400 px-2 py-1"><i class="fa-solid fa-trash"></i> 削除</button>
                    </div>`;
                }

                let headerHtml = `
                ${catAdminBar}
                <div class="border-b border-slate-800 pb-3 flex items-center justify-between">
                    <h2 class="text-lg sm:text-xl font-bold tracking-wider flex items-center gap-2 text-amber-400" style="font-family: 'Cinzel', 'Noto Sans JP', serif;">
                        <i class="${cat.icon} text-xl"></i> ${cat.title} <span class="text-xs text-slate-500 font-mono font-medium">${cat.sub}</span>
                    </h2>
                </div>`;

                sec.innerHTML = headerHtml;

                if (cat.cards.length === 0) {
                    const emptyBlock = document.createElement('div');
                    emptyBlock.className = "relative bg-slate-950/40 border border-dashed border-slate-800 rounded-3xl p-8 text-center text-slate-500 text-xs";
                    emptyBlock.innerHTML = `<p><i class="fa-solid fa-folder-open mr-1"></i> 作品カードがありません。下の点線枠からボタンを追加してください。</p>`;
                    sec.appendChild(emptyBlock);
                } else {
                    cat.cards.forEach((card, cardIdx) => {
                        const cardWrapper = document.createElement('div');
                        cardWrapper.className = "relative bg-gradient-to-br from-slate-950 via-slate-950 to-slate-900 border border-slate-900 rounded-3xl p-4 sm:p-8 shadow-xl flex flex-row gap-4 sm:gap-8 items-center justify-start hover:border-slate-800 transition-all duration-300 group/card";

                        if (isEditMode) {
                            const isFirst = cardIdx === 0;
                            const isLast = cardIdx === cat.cards.length - 1;
                            const cardAdminOverlay = document.createElement('div');
                            cardAdminOverlay.className = "absolute top-3 right-3 z-50 flex gap-2";
                            cardAdminOverlay.innerHTML = `
                                ${!isFirst ? `<button onclick="moveCard(${catIdx}, ${cardIdx}, -1)" class="bg-slate-700 hover:bg-slate-600 text-amber-400 text-xs font-bold px-2.5 py-1 rounded-lg shadow-md" title="前へ"><i class="fa-solid fa-arrow-up"></i></button>` : ''}
                                ${!isLast ? `<button onclick="moveCard(${catIdx}, ${cardIdx}, 1)" class="bg-slate-700 hover:bg-slate-600 text-amber-400 text-xs font-bold px-2.5 py-1 rounded-lg shadow-md" title="次へ"><i class="fa-solid fa-arrow-down"></i></button>` : ''}
                                <button onclick="openCardModal('${cat.id}', ${cardIdx})" class="bg-sky-600 hover:bg-sky-500 text-white text-xs font-bold px-3 py-1 rounded-lg shadow-md"><i class="fa-solid fa-marker"></i> 編集</button>
                                <button onclick="deleteCard(${catIdx}, ${cardIdx})" class="bg-rose-600 hover:bg-rose-500 text-white text-xs font-bold px-3 py-1 rounded-lg shadow-md"><i class="fa-solid fa-trash-can"></i> 削除</button>
                            `;
                            cardWrapper.appendChild(cardAdminOverlay);
                        }

                        const btnSlot = document.createElement('div');
                        btnSlot.className = "flex flex-col items-center justify-center shrink-0 select-none";
                        const escapedTitleId = encodeURIComponent(card.title).replace(/%/g, "");
                        
                        btnSlot.innerHTML = `
                        <div class="relative select-none w-[100px] h-[100px] sm:w-[240px] sm:h-[240px] aspect-square flex items-center justify-center overflow-hidden rounded-2xl border-2 border-slate-800" 
                             id="btn-frame-${escapedTitleId}">
                             <iframe srcdoc="${card.htmlContent.replace(/"/g, '&quot;')}" class="w-full h-full border-0 bg-transparent overflow-hidden" scrolling="no"></iframe>
                        </div>`;

                        const currentRecord = plipCardStates.find(s => s.title === card.title) || { state: 0 };
                        const stateLabels = ['🥇 金枠 (BGM)', '🥈 銀枠 (歌抽選)', '🩸 赤枠 (オフ)'];

                        const infoSlot = document.createElement('div');
                        infoSlot.className = "flex flex-col justify-between py-1 flex-grow text-left";
                        infoSlot.innerHTML = `
                        <div class="flex flex-col gap-1 sm:gap-2">
                            <div class="flex items-center justify-start gap-2 flex-wrap">
                                <span class="px-2 py-0.5 rounded bg-amber-500/10 text-amber-400 border border-amber-500/20 text-[10px] font-bold tracking-widest uppercase">WORKS</span>
                                <span id="tag-label-${escapedTitleId}" class="text-[10px] sm:text-xs text-amber-400 font-semibold px-2 py-0.5 bg-slate-900 rounded-full border border-slate-800">${stateLabels[currentRecord.state]}</span>
                            </div>
                            <h3 class="text-base sm:text-2xl font-bold text-white mt-0.5" style="font-family: 'Shippori Mincho', serif;">
                                ${card.title}
                            </h3>
                            <p class="text-xs sm:text-sm text-slate-400 font-light leading-relaxed max-w-xl">
                                ${card.desc}
                            </p>
                        </div>
                        <div class="mt-2 sm:mt-6 flex flex-wrap gap-2 items-center justify-between border-t border-slate-900 pt-2 sm:pt-5">
                            <span class="text-[10px] sm:text-xs text-slate-500"><i class="fa-solid fa-volume-high mr-1"></i> 左のボタンを押すと枠色と曲が切り替わります</span>
                            <a href="${card.url}" target="_blank" rel="noopener noreferrer" class="px-4 sm:px-8 py-2 sm:py-3 rounded-xl bg-amber-500 hover:bg-amber-600 text-[11px] sm:text-sm font-extrabold text-slate-950 transition-all shadow-[0_4px_20px_rgba(245,158,11,0.2)] flex items-center justify-center gap-2">
                                起動する <i class="fa-solid fa-arrow-up-right-from-square"></i>
                            </a>
                        </div>`;

                        cardWrapper.appendChild(btnSlot);
                        cardWrapper.appendChild(infoSlot);
                        sec.appendChild(cardWrapper);
                    });
                }

                if (isEditMode) {
                    const addCardBox = document.createElement('div');
                    addCardBox.className = "border-2 border-dashed border-slate-800 hover:border-amber-500/40 rounded-3xl p-4 text-center cursor-pointer transition-all";
                    addCardBox.setAttribute('onclick', `openCardModal('${cat.id}', -1)`);
                    addCardBox.innerHTML = `<p class="text-xs text-slate-500 font-bold hover:text-amber-400"><i class="fa-solid fa-plus-circle"></i> このカテゴリに新しい作品カードを追加する</p>`;
                    sec.appendChild(addCardBox);
                }

                contentContainer.appendChild(sec);
            });
        }

        function forceSyncUniversalBurst(cardTitle, nextStateValue) {
            playMechanicalClick();
            let record = plipCardStates.find(s => s.title === cardTitle);
            if (!record) {
                record = { title: cardTitle, state: 0 };
                plipCardStates.push(record);
            }

            record.state = nextStateValue;

async function runAudioTheme(escapedTitleId, stateValue) {
    // 親画面側で管理していた古い再生テスト用要素は安全にクリア
    clearRunningAudio();
    
    const matchedCard = plipMasterData.flatMap(c => c.cards).find(card => encodeURIComponent(card.title).replace(/%/g, "") === escapedTitleId);
    const cleanLabel = matchedCard ? matchedCard.title : "作品";

    // --- 枠色のビジュアル変更ロジックの調停 ---
    const btnFrame = document.getElementById(`btn-frame-${escapedTitleId}`);
    if (btnFrame) {
        // 一度すべての枠色クラスをリセット
        btnFrame.className = "relative select-none w-[100px] h-[100px] sm:w-[240px] sm:h-[240px] aspect-square flex items-center justify-center overflow-hidden rounded-2xl border-2";
        if (stateValue === 0) {
            btnFrame.classList.add('border-amber-400', 'shadow-[0_0_15px_rgba(245,158,11,0.5)]'); // 金枠
            showToast(`🥇 【${cleanLabel}】 金枠 (BGMテスト再生)`);
        } else if (stateValue === 1) {
            btnFrame.classList.add('border-slate-300', 'shadow-[0_0_15px_rgba(203,213,225,0.5)]'); // 銀枠
            showToast(`🎵 【${cleanLabel}】 銀枠 (歌抽選テスト再生)`);
        } else if (stateValue === 2) {
            btnFrame.classList.add('border-rose-600', 'shadow-[0_0_15px_rgba(225,29,72,0.5)]'); // 赤枠
            showToast(`🤫 【${cleanLabel}】 赤枠 (ミュート中)`);
        }
    }

    // --- 親画面側での音声テスト再生ロジック（擬似オーディオスプラッシュ） ---
    try {
        if (stateValue === 0) {
            // 金枠：シンセBGM風（低めの心地よいサイン波ループ）
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(330, ctx.currentTime); // E4
            gain.gain.setValueAtTime(0.08, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.4);
            activeAudioElement = { pause: () => { osc.stop(); }, remove: () => {} };
        } else if (stateValue === 1) {
            // 銀枠：歌抽選風（きらきらした高音のアルペジオ）
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const now = ctx.currentTime;
            [523.25, 659.25, 783.99].forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + (i * 0.08));
                gain.gain.setValueAtTime(0.05, now + (i * 0.08));
                gain.gain.exponentialRampToValueAtTime(0.0001, now + (i * 0.08) + 0.3);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now + (i * 0.08));
                osc.stop(now + (i * 0.08) + 0.3);
            });
        } else if (stateValue === 2) {
            // 赤枠：ミュート（無音、または閉じるノイズ）
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(120, ctx.currentTime);
            gain.gain.setValueAtTime(0.05, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.05);
        }
    } catch (e) {
        console.error("音声テスト再生に失敗しました:", e);
    }
}

            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // スプレッドシートへ送信する通信ロジック（CORSチェック完全回避版）
        function submitFeedbackForm() {
            const msg = document.getElementById('feedback-content').value.trim();
            if (!msg) {
                showToast('メッセージ内容が空です。');
                return;
            }

            // 送信ボタンの連打を防ぐため一時的にロック
            const sendBtn = document.getElementById('send-feedback-btn');
            sendBtn.disabled = true;
            sendBtn.textContent = '転送中...';
            sendBtn.className = 'bg-slate-800 text-slate-500 px-5 py-2 rounded-xl text-xs font-bold cursor-not-allowed';

            // 画面サイズを取得
            const screenSize = `${window.innerWidth}x${window.innerHeight}`;

            // GAS（Google Apps Script）のウェブアプリURL
            const googleGasUrl = 'https://script.google.com/macros/s/AKfycbyfeSVzcBb8BeZgzXwFgN5iA8iFautRGB3R4TYYGzfBSZXW3HoGqJpss-P2TbCzOcVsSQ/exec';

            // mode: 'no-cors' と Content-Type: 'text/plain' によりセキュリティチェックを回避
            fetch(googleGasUrl, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify({ message: msg, screenSize: screenSize })
            })
            .then(response => {
                // no-corsモードではレスポンス内容がブラウザに隠蔽されるため、疎通完了＝成功として処理
                showToast("🚀 ご意見を転送しました！");
                closeFeedbackModal();
            })
            .catch(error => {
                console.error('Error:', error);
                showToast("🚀 お疲れさまでした。");
            })
            .finally(() => {
                // ボタンの状態を元に戻す
                sendBtn.disabled = false;
                sendBtn.textContent = '意見を送信する';
                sendBtn.className = 'bg-cyan-600 hover:bg-cyan-500 text-white font-black px-5 py-2 rounded-xl text-xs transition-all shadow-lg shadow-cyan-600/20';
            });
        }

        // 📱 モーダルの外側（暗い背景）をタップ・クリックした時にもポップアップを閉じる処理
        document.addEventListener('click', (event) => {
            const modal = document.getElementById('feedback-modal');
            if (modal && !modal.classList.contains('hidden') && event.target === modal) {
                closeFeedbackModal();
            }
        });
		
    </script>
